<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowserBot Checker - PII Masking</title>
  <meta name="author" content="Founder Bilal - nexagaze">
  <meta name="keywords" content="PII redaction, PII masking, credit card detection, SSN redactor, regex detection, nexagaze, bilal, AI, open source, behavior tracking">
  <link rel="icon" href="data:,">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif; }
    body { background: #0f172a; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    .container { background: #1e293b; padding: 2rem; border-radius: 16px; width: 640px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
    h2 { color: #38bdf8; text-align: center; margin-bottom: 0.25rem; }
    .subtitle { text-align: center; color: #64748b; font-size: 0.85rem; margin-bottom: 1.25rem; }
    label { color: #94a3b8; font-size: 0.85rem; display: block; margin-bottom: 0.4rem; }
    textarea { width: 100%; height: 140px; padding: 0.75rem; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: 0.9rem; resize: vertical; outline: none; }
    textarea:focus { border-color: #38bdf8; }
    .actions { display: flex; gap: 0.5rem; margin: 0.75rem 0; }
    .actions button { padding: 0.6rem 1.2rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
    #maskBtn { background: #38bdf8; color: #0f172a; flex: 1; }
    #maskBtn:hover { background: #0ea5e9; }
    #maskBtn:disabled { opacity: 0.5; cursor: not-allowed; }
    #clearBtn { background: #334155; color: #94a3b8; }
    #clearBtn:hover { background: #475569; }
    #copyBtn { background: #334155; color: #94a3b8; }
    #copyBtn:hover { background: #475569; }
    .demo-btn.pass { background: #14532d; color: #4ade80; }
    .demo-btn.pass:hover { background: #166534; }
    .demo-btn.fail { background: #450a0a; color: #f87171; }
    .demo-btn.fail:hover { background: #7f1d1d; }
    .result-area { margin-top: 0.75rem; }
    .result-area textarea { height: 140px; background: #0f172a; }
    .summary { margin-top: 0.5rem; padding: 0.6rem 0.8rem; background: #0f172a; border-radius: 8px; color: #94a3b8; font-size: 0.8rem; word-wrap: break-word; min-height: 2rem; }
    .action-badge { text-align: center; margin-top: 0.5rem; font-weight: 700; font-size: 1.1rem; min-height: 1.6rem; }
    .action-badge.rejected { color: #ef4444; }
    .action-badge.passed { color: #22c55e; }
    .status { text-align: center; color: #94a3b8; font-size: 0.8rem; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h2>BrowserBot Checker</h2>
    <p class="subtitle">PII Masking Proxy — Local AI + Regex</p>

    <label for="inputText">Paste text containing PII:</label>
    <textarea id="inputText" placeholder="e.g. John Doe's email is john@example.com and his card is 4111-1111-1111-1111"></textarea>

    <div class="actions" style="flex-wrap: wrap;">
      <button id="maskBtn">Mask PII</button>
      <button id="demoPassBtn" class="demo-btn pass">Demo Pass</button>
      <button id="demoFailBtn" class="demo-btn fail">Demo Fail</button>
      <button id="clearBtn">Clear</button>
      <button id="copyBtn">Copy</button>
    </div>

    <div class="result-area">
      <label for="outputText">Masked Output:</label>
      <textarea id="outputText" readonly placeholder="Masked result will appear here..."></textarea>
    </div>

    <div id="summary" class="summary">Enter text and click Mask PII</div>
    <div id="actionBadge" class="action-badge"></div>
    <div id="status" class="status">Local Ollama &bull; minimax-m2.1:cloud</div>
  </div>

  <div style="text-align:center;padding:1rem;color:#475569;font-size:0.75rem;border-top:1px solid #1e293b;">
    nexagaze project &mdash; built by Founder Bilal &bull;
    <a href="mailto:ai@nexagaze.com" style="color:#64748b;">ai@nexagaze.com</a> &bull;
    <a href="https://wa.me/9203103860653" style="color:#64748b;">03103860653</a>
  </div>

  <script>
    const inputEl = document.getElementById('inputText');
    const outputEl = document.getElementById('outputText');
    const summaryEl = document.getElementById('summary');
    const actionBadge = document.getElementById('actionBadge');
    const maskBtn = document.getElementById('maskBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');
    const demoPassBtn = document.getElementById('demoPassBtn');
    const demoFailBtn = document.getElementById('demoFailBtn');

    async function maskPII() {
      const text = inputEl.value.trim();
      if (!text) return;
      maskBtn.disabled = true;
      maskBtn.textContent = 'Masking...';
      summaryEl.textContent = 'Processing with Ollama...';
      try {
        const res = await fetch('/mask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        outputEl.value = data.masked;
        summaryEl.textContent = data.summary || 'No PII detected';
        actionBadge.textContent = data.action === 'REJECTED' ? 'BLOCKED — PII Found' : 'PASSED — Safe to Send';
        actionBadge.className = 'action-badge ' + (data.action === 'REJECTED' ? 'rejected' : 'passed');
      } catch (err) {
        summaryEl.textContent = 'Error: ' + err.message;
      }
      maskBtn.disabled = false;
      maskBtn.textContent = 'Mask PII';
    }

    maskBtn.addEventListener('click', maskPII);
    clearBtn.addEventListener('click', () => { inputEl.value = ''; outputEl.value = ''; summaryEl.textContent = 'Cleared'; actionBadge.textContent = ''; actionBadge.className = 'action-badge'; });
    copyBtn.addEventListener('click', () => { outputEl.select(); navigator.clipboard.writeText(outputEl.value); });
    demoPassBtn.addEventListener('click', () => { inputEl.value = 'Hey, just confirming our meeting at 3pm tomorrow. Let me know if that works. Thanks!'; outputEl.value = ''; summaryEl.textContent = 'Demo loaded — click Mask PII'; actionBadge.textContent = ''; actionBadge.className = 'action-badge'; });
    demoFailBtn.addEventListener('click', () => { inputEl.value = 'Hi, this is John Doe from Acme Corp. My email is john.doe@acme.com and my card number is 4111-1111-1111-1111. You can reach me at +1-555-123-4567.'; outputEl.value = ''; summaryEl.textContent = 'Demo loaded — click Mask PII'; actionBadge.textContent = ''; actionBadge.className = 'action-badge'; });
    inputEl.addEventListener('keydown', (e) => { if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') maskPII(); });
  </script>
</body>
</html>
